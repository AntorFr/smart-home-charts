#
# IMPORTANT NOTE
#
# This chart inherits from our common library chart.
#

compatibility:
  # Select a tested upstream profile. Updating this value is the preferred upgrade path.
  profile: v1.1.13
  # When true, explicit image tags different from profile tags fail the render.
  strict: false
  profiles:
    v1.1.13:
      images:
        web:
          tag: v1.1.13
        worker:
          tag: v1.1.13
        redis:
          tag: 8.2.2
        typesense:
          tag: "29.0"
        db:
          tag: 15.8.1.085
        studio:
          tag: 2025.12.09-sha-434634f
        kong:
          tag: 2.8.1
        auth:
          tag: v2.183.0
        rest:
          tag: v14.1
        storage:
          tag: v1.33.0
        meta:
          tag: v0.93.1
        supavisor:
          tag: 2.7.4
        dav:
          tag: nginx
        webdav:
          tag: v5.10.1

image:
  repository: ghcr.io/kurrier-org/kurrier-web
  tag:
  pullPolicy: IfNotPresent

env:
  TZ: UTC
  WEB_PORT: "3000"
  WEB_URL: http://localhost:3000
  DATABASE_URL: postgres://postgres:$(POSTGRES_PASSWORD)@$(POSTGRES_HOST):$(POSTGRES_PORT)/$(POSTGRES_DB)
  DATABASE_RLS_URL: postgres://rls_client:$(RLS_CLIENT_PASSWORD)@$(POSTGRES_HOST):$(POSTGRES_PORT)/$(POSTGRES_DB)
  API_PUBLIC_URL: $(SUPABASE_PUBLIC_URL)
  API_URL: http://kong:8000
  ANON_KEY: $(ANON_KEY)
  SERVICE_ROLE_KEY: $(SERVICE_ROLE_KEY)
  REDIS_PASSWORD: $(REDIS_PASSWORD)
  REDIS_HOST: redis
  REDIS_PORT: $(REDIS_PORT)
  TYPESENSE_API_KEY: $(TYPESENSE_API_KEY)
  TYPESENSE_PORT: $(TYPESENSE_PORT)
  TYPESENSE_PROTOCOL: $(TYPESENSE_PROTOCOL)
  TYPESENSE_HOST: $(TYPESENSE_HOST)
  SEARCH_REBUILD_ON_BOOT: $(SEARCH_REBUILD_ON_BOOT)
  WORKER_URL: http://worker:3001
  DAV_URL: http://dav:80

service:
  main:
    ports:
      http:
        port: 3000

ingress:
  main:
    enabled: false

database:
  # valid values: cnpg, embedded, external
  mode: cnpg
  cnpg:
    enabled: true
    clusterName: db
    instances: 1
    imageName: ghcr.io/cloudnative-pg/postgresql:15.8
    storage:
      size: 20Gi
      storageClass: local-path
    # Reuses POSTGRES_PASSWORD from envFile.content when existingSecret is empty.
    existingSecret: ""
    username: postgres
    database: postgres
  external:
    host: ""
    port: 5432
    database: postgres

# Keep default probes conservative for startup; web app can take time during first boot.
probes:
  liveness:
    enabled: true
    custom: true
    spec:
      httpGet:
        path: /
        port: 3000
      initialDelaySeconds: 30
      periodSeconds: 30
      timeoutSeconds: 5
      failureThreshold: 5
  readiness:
    enabled: true
    custom: true
    spec:
      httpGet:
        path: /
        port: 3000
      initialDelaySeconds: 10
      periodSeconds: 15
      timeoutSeconds: 5
      failureThreshold: 5
  startup:
    enabled: true
    custom: true
    spec:
      httpGet:
        path: /
        port: 3000
      initialDelaySeconds: 0
      periodSeconds: 10
      timeoutSeconds: 5
      failureThreshold: 30

envFile:
  # If set, this existing secret is used and envFile.content is ignored.
  existingSecret: ""
  # Optional override for generated secret name when existingSecret is not used.
  nameOverride: ""
  # Create a secret from envFile.content.
  create: true
  # Inject the shared env secret in the common/web workload.
  injectToWeb: true
  # Compose-style env block. Keep this close to upstream example.env for easier upgrades.
  content: |
    WEB_PORT=3000
    WEB_URL=http://web:3000
    WORKER_URL=http://worker:3001

    REDIS_PASSWORD=replace_with_your_redis_password
    REDIS_HOST=redis
    REDIS_PORT=6379
    RLS_CLIENT_PASSWORD=replace_with_your_rls_client_password

    TYPESENSE_API_KEY=supersecretkey
    TYPESENSE_PORT=8108
    TYPESENSE_PROTOCOL=http
    TYPESENSE_HOST=typesense

    SEARCH_REBUILD_ON_BOOT=false

    POSTGRES_PASSWORD=your-super-secret-and-long-postgres-password
    JWT_SECRET=your-super-secret-jwt-token-with-at-least-32-characters-long
    ANON_KEY=replace_with_anon_key
    SERVICE_ROLE_KEY=replace_with_service_role_key
    DASHBOARD_USERNAME=supabase
    DASHBOARD_PASSWORD=replace_with_dashboard_password
    SECRET_KEY_BASE=replace_with_secret_key_base
    VAULT_ENC_KEY=replace_with_32_char_min_key

    SUPABASE_PUBLIC_URL=http://localhost:8000

    POSTGRES_HOST=db-rw
    POSTGRES_DB=postgres
    POSTGRES_PORT=5432

    POOLER_PROXY_PORT_TRANSACTION=6543
    POOLER_DEFAULT_POOL_SIZE=20
    POOLER_MAX_CLIENT_CONN=100
    POOLER_TENANT_ID=kurrier
    POOLER_DB_POOL_SIZE=5

    KONG_HTTP_PORT=8000
    KONG_HTTPS_PORT=8443

    PGRST_DB_SCHEMAS=public,storage,graphql_public

    SITE_URL=http://localhost:3000
    ADDITIONAL_REDIRECT_URLS=
    JWT_EXPIRY=3600
    DISABLE_SIGNUP=false
    API_EXTERNAL_URL=http://localhost:8000

    MAILER_URLPATHS_CONFIRMATION=/auth/v1/verify
    MAILER_URLPATHS_INVITE=/auth/v1/verify
    MAILER_URLPATHS_RECOVERY=/auth/v1/verify
    MAILER_URLPATHS_EMAIL_CHANGE=/auth/v1/verify

    ENABLE_EMAIL_SIGNUP=true
    ENABLE_EMAIL_AUTOCONFIRM=true
    SMTP_ADMIN_EMAIL=admin@example.com
    SMTP_HOST=supabase-mail
    SMTP_PORT=2500
    SMTP_USER=fake_mail_user
    SMTP_PASS=fake_mail_password
    SMTP_SENDER_NAME=fake_sender
    ENABLE_ANONYMOUS_USERS=false

    ENABLE_PHONE_SIGNUP=true
    ENABLE_PHONE_AUTOCONFIRM=true

    STUDIO_DEFAULT_ORGANIZATION=Kurrier
    STUDIO_DEFAULT_PROJECT=Kurrier
    STUDIO_PORT=3000

    IMGPROXY_ENABLE_WEBP_DETECTION=true
    OPENAI_API_KEY=

    FUNCTIONS_VERIFY_JWT=false

    LOGFLARE_PUBLIC_ACCESS_TOKEN=replace_with_logflare_public_token
    LOGFLARE_PRIVATE_ACCESS_TOKEN=replace_with_logflare_private_token

    DOCKER_SOCKET_LOCATION=/var/run/docker.sock
    GOOGLE_PROJECT_ID=GOOGLE_PROJECT_ID
    GOOGLE_PROJECT_NUMBER=GOOGLE_PROJECT_NUMBER

stack:
  enabled: true
  # When true, all stack services receive envFrom secretRef to envFile secret.
  envFromSharedSecret: true

  services:
    worker:
      enabled: true
      controller: deployment
      replicas: 1
      image:
        repository: ghcr.io/kurrier-org/kurrier-worker
        tag:
        pullPolicy: IfNotPresent
      ports:
        http: 3001
      service:
        enabled: true
        type: ClusterIP
      env:
        WEB_PORT: "3000"
        WEB_URL: $(WEB_URL)
        DATABASE_URL: postgres://postgres:$(POSTGRES_PASSWORD)@$(POSTGRES_HOST):$(POSTGRES_PORT)/$(POSTGRES_DB)
        DATABASE_RLS_URL: postgres://rls_client:$(RLS_CLIENT_PASSWORD)@$(POSTGRES_HOST):$(POSTGRES_PORT)/$(POSTGRES_DB)
        API_PUBLIC_URL: $(SUPABASE_PUBLIC_URL)
        API_URL: http://kong:8000
        ANON_KEY: $(ANON_KEY)
        SERVICE_ROLE_KEY: $(SERVICE_ROLE_KEY)
        REDIS_PASSWORD: $(REDIS_PASSWORD)
        REDIS_HOST: redis
        REDIS_PORT: $(REDIS_PORT)
        TYPESENSE_API_KEY: $(TYPESENSE_API_KEY)
        TYPESENSE_PORT: $(TYPESENSE_PORT)
        TYPESENSE_PROTOCOL: $(TYPESENSE_PROTOCOL)
        TYPESENSE_HOST: $(TYPESENSE_HOST)
        SEARCH_REBUILD_ON_BOOT: $(SEARCH_REBUILD_ON_BOOT)
        LOCAL_TUNNEL_URL: $(LOCAL_TUNNEL_URL)
        NITRO_PORT: "3001"
        DAV_URL: http://dav:80
        WEB_DAV_URL: http://webdav:6065
      persistence:
        dav-config:
          enabled: true
          type: hostPath
          hostPath: /srv/kurrier/dav_config
          hostPathType: DirectoryOrCreate
          mountPath: /dav-config
        dav-data:
          enabled: true
          type: hostPath
          hostPath: /srv/kurrier/dav_data
          hostPathType: DirectoryOrCreate
          mountPath: /dav-data
        webdav-data:
          enabled: true
          type: hostPath
          hostPath: /srv/kurrier/webdav/data
          hostPathType: DirectoryOrCreate
          mountPath: /data

    redis:
      enabled: true
      controller: deployment
      replicas: 1
      image:
        repository: redis
        tag:
        pullPolicy: IfNotPresent
      command:
        - sh
        - -ec
      args:
        - exec redis-server --appendonly yes --requirepass "$REDIS_PASSWORD"
      ports:
        redis: 6379
      service:
        enabled: true
        type: ClusterIP
      persistence:
        data:
          enabled: true
          type: hostPath
          hostPath: /srv/kurrier/redis_data
          hostPathType: DirectoryOrCreate
          mountPath: /data

    typesense:
      enabled: true
      controller: deployment
      replicas: 1
      image:
        repository: typesense/typesense
        tag:
        pullPolicy: IfNotPresent
      args:
        - --data-dir
        - /data
        - --api-key=$(TYPESENSE_API_KEY)
        - --enable-cors
      ports:
        http: 8108
      service:
        enabled: true
        type: ClusterIP
      persistence:
        data:
          enabled: true
          type: hostPath
          hostPath: /srv/kurrier/typesense-data
          hostPathType: DirectoryOrCreate
          mountPath: /data

    db:
      # Used only when database.mode=embedded
      enabled: true
      controller: deployment
      replicas: 1
      image:
        repository: supabase/postgres
        tag:
        pullPolicy: IfNotPresent
      ports:
        postgresql: 5432
      service:
        enabled: true
        type: ClusterIP
      persistence:
        data:
          enabled: true
          type: hostPath
          hostPath: /srv/kurrier/volumes/db/data
          hostPathType: DirectoryOrCreate
          mountPath: /var/lib/postgresql/data
      resources: {}

    studio:
      enabled: true
      controller: deployment
      replicas: 1
      image:
        repository: supabase/studio
        tag:
        pullPolicy: IfNotPresent
      ports:
        http: 3000
      service:
        enabled: true
        type: ClusterIP
      env:
        HOSTNAME: "::"
        STUDIO_PG_META_URL: http://meta:8080
        NEXT_PUBLIC_ENABLE_LOGS: "true"
        NEXT_ANALYTICS_BACKEND_PROVIDER: postgres

    kong:
      enabled: true
      controller: deployment
      replicas: 1
      image:
        repository: kong
        tag:
        pullPolicy: IfNotPresent
      command:
        - sh
        - -ec
      args:
        - envsubst < /etc/kurrier-config/kong.yml > /home/kong/kong.yml && exec /docker-entrypoint.sh kong docker-start
      ports:
        http: 8000
        https: 8443
      service:
        enabled: true
        type: ClusterIP
      env:
        KONG_DATABASE: "off"
        KONG_DECLARATIVE_CONFIG: /home/kong/kong.yml
        KONG_DNS_ORDER: LAST,A,CNAME
        KONG_PLUGINS: request-transformer,cors,key-auth,acl,basic-auth,request-termination,ip-restriction
        KONG_NGINX_PROXY_PROXY_BUFFER_SIZE: 160k
        KONG_NGINX_PROXY_PROXY_BUFFERS: 64 160k
      configFiles:
        kong:
          mountPath: /etc/kurrier-config
          data:
            kong.yml: |
              _format_version: "2.1"
              _transform: true
              services: []

    auth:
      enabled: true
      controller: deployment
      replicas: 1
      image:
        repository: supabase/gotrue
        tag:
        pullPolicy: IfNotPresent
      ports:
        http: 9999
      service:
        enabled: true
        type: ClusterIP
      env:
        GOTRUE_API_HOST: 0.0.0.0
        GOTRUE_API_PORT: "9999"
        GOTRUE_DB_DRIVER: postgres

    rest:
      enabled: true
      controller: deployment
      replicas: 1
      image:
        repository: postgrest/postgrest
        tag:
        pullPolicy: IfNotPresent
      command:
        - postgrest
      ports:
        http: 3000
      service:
        enabled: true
        type: ClusterIP

    storage:
      enabled: true
      controller: deployment
      replicas: 1
      image:
        repository: supabase/storage-api
        tag:
        pullPolicy: IfNotPresent
      ports:
        http: 5000
      service:
        enabled: true
        type: ClusterIP
      persistence:
        storage:
          enabled: true
          type: hostPath
          hostPath: /srv/kurrier/volumes/storage
          hostPathType: DirectoryOrCreate
          mountPath: /var/lib/storage

    meta:
      enabled: true
      controller: deployment
      replicas: 1
      image:
        repository: supabase/postgres-meta
        tag:
        pullPolicy: IfNotPresent
      ports:
        http: 8080
      service:
        enabled: true
        type: ClusterIP

    supavisor:
      enabled: true
      controller: deployment
      replicas: 1
      image:
        repository: supabase/supavisor
        tag:
        pullPolicy: IfNotPresent
      ports:
        pooler: 6543
      service:
        enabled: true
        type: ClusterIP

    dav:
      enabled: true
      controller: deployment
      replicas: 1
      image:
        repository: ckulka/baikal
        tag:
        pullPolicy: IfNotPresent
      ports:
        http: 80
      service:
        enabled: true
        type: ClusterIP
      persistence:
        config:
          enabled: true
          type: hostPath
          hostPath: /srv/kurrier/dav_config
          hostPathType: DirectoryOrCreate
          mountPath: /var/www/baikal/config
        data:
          enabled: true
          type: hostPath
          hostPath: /srv/kurrier/dav_data
          hostPathType: DirectoryOrCreate
          mountPath: /var/www/baikal/Specific

    webdav:
      enabled: true
      controller: deployment
      replicas: 1
      image:
        repository: ghcr.io/hacdias/webdav
        tag:
        pullPolicy: IfNotPresent
      command:
        - /webdav
      args:
        - -c
        - /config.yml
      ports:
        http: 6065
      service:
        enabled: true
        type: ClusterIP
      configFiles:
        webdav:
          mountPath: /
          data:
            config.yml: |
              address: 0.0.0.0
              port: 6065
              directory: /data
              users:
                - username: admin
                  password: admin
      persistence:
        data:
          enabled: true
          type: hostPath
          hostPath: /srv/kurrier/webdav/data
          hostPathType: DirectoryOrCreate
          mountPath: /data

    db-bootstrap:
      enabled: false
      controller: job
      image:
        repository: postgres
        tag: "15"
        pullPolicy: IfNotPresent
      command:
        - sh
        - -ec
      args:
        - echo "Provide bootstrap scripts via custom config or override this job in your values file." && exit 0
