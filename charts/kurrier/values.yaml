# Kurrier v3 stack (https://github.com/kurrier-org/kurrier)
# Mirrors upstream db/docker-compose.yml: web (common workload), worker, redis,
# typesense, dav (Baikal), garage (S3) + CNPG PostgreSQL and a db-init Job that
# runs the upstream db-bootstrap.sh migrations.
#
# NOTE: stack service hostnames below assume the release is named "kurrier"
# (services are rendered as <release>-<name>, e.g. kurrier-redis).

image:
  repository: ghcr.io/kurrier-org/kurrier-web
  # Upstream release tag (vX.Y.Z). Pinned by the deployment values.
  # Also used as default tag for the worker image and as the source tag for
  # the db-init Job (migrations are fetched from the upstream repo at this tag).
  tag:
  pullPolicy: IfNotPresent

env:
  TZ: UTC

# Applied to the web pod (via common) and to every stack/db-init pod.
# ndots:1 resolves external names (github.com, IMAP/SMTP hosts) directly
# instead of walking the k8s search domains first — matches upstream compose
# behaviour (plain Docker DNS) and avoids resolvers giving up on local search
# domains that answer NODATA instead of NXDOMAIN.
dnsConfig:
  options:
    - name: ndots
      value: "1"

service:
  main:
    ports:
      http:
        port: 3000

ingress:
  main:
    enabled: false

# Keep default probes conservative for startup; web app can take time during first boot.
probes:
  liveness:
    enabled: true
    custom: true
    spec:
      httpGet:
        path: /
        port: 3000
      initialDelaySeconds: 30
      periodSeconds: 30
      timeoutSeconds: 5
      failureThreshold: 5
  readiness:
    enabled: true
    custom: true
    spec:
      httpGet:
        path: /
        port: 3000
      initialDelaySeconds: 10
      periodSeconds: 15
      timeoutSeconds: 5
      failureThreshold: 5
  startup:
    enabled: true
    custom: true
    spec:
      httpGet:
        path: /
        port: 3000
      initialDelaySeconds: 0
      periodSeconds: 10
      timeoutSeconds: 5
      failureThreshold: 30

envFile:
  # If set, this existing secret is used and envFile.content is ignored.
  existingSecret: ""
  # Optional override for generated secret name when existingSecret is not used.
  nameOverride: ""
  # Create a secret from envFile.content.
  create: true
  # Inject the shared env secret in the common/web workload.
  injectToWeb: true
  # Compose-style env block. Keep this close to upstream db/example.env for
  # easier upgrades; hostnames are adapted to the k8s service names.
  # DATABASE_RLS_URL / DAV_DATABASE_URL credentials must stay consistent with
  # database.cnpg.username and the roles created by the db-init Job.
  content: |
    WEB_PORT=3000
    WEB_URL=http://localhost:3000
    NITRO_PORT=3001
    HOST=0.0.0.0

    REDIS_PASSWORD=replace_with_your_redis_password
    REDIS_HOST=kurrier-redis
    REDIS_PORT=6379

    TYPESENSE_API_KEY=supersecretkey
    TYPESENSE_PORT=8108
    TYPESENSE_PROTOCOL=http
    TYPESENSE_HOST=kurrier-typesense

    POSTGRES_USER=postgres
    POSTGRES_PASSWORD=replace_with_your_password
    POSTGRES_DB=kurrier
    POSTGRES_PORT=5432
    POSTGRES_HOST=db-rw

    DATABASE_URL=postgresql://postgres:replace_with_your_password@db-rw:5432/kurrier
    DATABASE_RLS_URL=postgresql://kurrier:replace_with_your_rls_password@db-rw:5432/kurrier

    JWT_SECRET=replace_with_your_jwt_secret
    APP_SECRET_ENCRYPTION_KEY=replace_with_32_byte_base64_key
    SEARCH_REBUILD_ON_BOOT=false

    DAV_URL=http://kurrier-dav:80
    DAV_DATABASE_URL=postgresql://baikal:replace_with_baikal_password@db-rw:5432/baikal
    WORKER_URL=http://kurrier-worker:3001

    GARAGE_ACCESS_KEY=replace_with_garage_access_key
    GARAGE_SECRET_KEY=replace_with_garage_secret_key
    GARAGE_BUCKET=kurrier-store
    GARAGE_RPC_SECRET=replace_with_64_char_hex_secret

    S3_ENDPOINT=http://kurrier-garage:3900
    S3_ACCESS_KEY=replace_with_garage_access_key
    S3_SECRET_KEY=replace_with_garage_secret_key
    S3_BUCKET=kurrier-store
    S3_REGION=garage
    S3_FORCE_PATH_STYLE=true

    OIDC_GOOGLE_CLIENT_ID=
    OIDC_GOOGLE_CLIENT_SECRET=

database:
  cnpg:
    enabled: true
    clusterName: db
    instances: 1
    imageName: ghcr.io/cloudnative-pg/postgresql:18.4-standard-trixie
    storage:
      size: 20Gi
      storageClass: local-path
    # Superuser password comes from POSTGRES_PASSWORD in envFile.content.
    # The app role (owner of the app database) password is parsed from
    # DATABASE_RLS_URL in envFile.content.
    username: kurrier
    database: kurrier

# One-shot Job (post-install/post-upgrade hook) that:
#  - creates the Baikal role + database (from DAV_DATABASE_URL) and seeds its schema
#  - runs the upstream db/init/db-bootstrap.sh migrations on the app database
# The upstream db/init folder is fetched at sourceRepo @ tag (default image.tag).
dbInit:
  enabled: true
  sourceRepo: https://github.com/kurrier-org/kurrier
  # Git tag to fetch db/init from; defaults to image.tag.
  tag: ""
  image:
    repository: postgres
    tag: "18"
    pullPolicy: IfNotPresent
  fetchImage:
    repository: alpine
    tag: "3.21"
    pullPolicy: IfNotPresent
  backoffLimit: 20

stack:
  enabled: true
  # When true, all stack services receive envFrom secretRef to envFile secret.
  envFromSharedSecret: true

  services:
    worker:
      enabled: true
      controller: deployment
      replicas: 1
      image:
        repository: ghcr.io/kurrier-org/kurrier-worker
        # Defaults to the root image.tag (web and worker are released together).
        tag:
        pullPolicy: IfNotPresent
      ports:
        http: 3001
      service:
        enabled: true
        type: ClusterIP

    redis:
      enabled: true
      controller: deployment
      replicas: 1
      image:
        repository: redis
        tag: 8.2.2
        pullPolicy: IfNotPresent
      command:
        - sh
        - -ec
      args:
        - exec redis-server --appendonly yes --stop-writes-on-bgsave-error no --requirepass "$REDIS_PASSWORD"
      ports:
        redis: 6379
      service:
        enabled: true
        type: ClusterIP
      persistence:
        redis-data:
          enabled: true
          type: hostPath
          hostPath: /srv/kurrier/redis_data
          hostPathType: DirectoryOrCreate
          mountPath: /data

    typesense:
      enabled: true
      controller: deployment
      replicas: 1
      image:
        repository: typesense/typesense
        tag: "29.0"
        pullPolicy: IfNotPresent
      args:
        - --data-dir
        - /data
        - --api-key=$(TYPESENSE_API_KEY)
        - --enable-cors
      ports:
        http: 8108
      service:
        enabled: true
        type: ClusterIP
      persistence:
        typesense-data:
          enabled: true
          type: hostPath
          hostPath: /srv/kurrier/typesense_data
          hostPathType: DirectoryOrCreate
          mountPath: /data

    dav:
      enabled: true
      controller: deployment
      replicas: 1
      image:
        repository: ckulka/baikal
        tag: nginx
        pullPolicy: IfNotPresent
      ports:
        http: 80
      service:
        enabled: true
        type: ClusterIP
      # Baikal preset config (upstream db/init/dav_config/baikal.yaml).
      # Seeded into the config volume on first start only (Baikal writes to its
      # config dir at runtime, so it cannot be a read-only configmap mount).
      # pgsql_* credentials must match DAV_DATABASE_URL in envFile.content.
      configFiles:
        preset:
          mountPath: /baikal-preset
          data:
            baikal.yaml: |
              system:
                  configured_version: 0.10.1
                  timezone: UTC
                  card_enabled: true
                  cal_enabled: true
                  dav_auth_type: Digest
                  admin_passwordhash: replace_with_admin_passwordhash
                  failed_access_message: 'user %u authentication failure for Baikal'
                  auth_realm: BaikalDAV
                  base_uri: ''
                  invite_from: noreply@_
              database:
                  sqlite_file: /var/www/baikal/Specific/db/db.sqlite
                  backend: pgsql
                  mysql_host: ''
                  mysql_dbname: ''
                  mysql_username: ''
                  mysql_password: ''
                  encryption_key: replace_with_encryption_key
                  pgsql_host: db-rw
                  pgsql_dbname: baikal
                  pgsql_username: baikal
                  pgsql_password: replace_with_baikal_password
      initContainers:
        - name: seed-config
          image: busybox:1.37
          command:
            - sh
            - -c
            - '[ -f /config/baikal.yaml ] || cp /baikal-preset/baikal.yaml /config/baikal.yaml'
          volumeMounts:
            - name: config
              mountPath: /baikal-preset
            - name: baikal-config
              mountPath: /config
      persistence:
        baikal-config:
          enabled: true
          type: hostPath
          hostPath: /srv/kurrier/dav_config
          hostPathType: DirectoryOrCreate
          mountPath: /var/www/baikal/config
        baikal-data:
          enabled: true
          type: hostPath
          hostPath: /srv/kurrier/dav_data
          hostPathType: DirectoryOrCreate
          mountPath: /var/www/baikal/Specific

    garage:
      enabled: true
      controller: deployment
      replicas: 1
      image:
        repository: dxflrs/garage
        tag: v2.3.0
        pullPolicy: IfNotPresent
      command:
        - /garage
        - -c
        - /etc/garage/garage.toml
        - server
        - --single-node
        - --default-bucket
      ports:
        s3: 3900
        rpc: 3901
        s3web: 3902
        admin: 3903
      service:
        enabled: true
        type: ClusterIP
      env:
        GARAGE_RPC_SECRET: $(GARAGE_RPC_SECRET)
        GARAGE_DEFAULT_ACCESS_KEY: $(GARAGE_ACCESS_KEY)
        GARAGE_DEFAULT_SECRET_KEY: $(GARAGE_SECRET_KEY)
        GARAGE_DEFAULT_BUCKET: $(GARAGE_BUCKET)
      configFiles:
        config:
          mountPath: /etc/garage
          data:
            garage.toml: |
              metadata_dir = "/var/lib/garage/meta"
              data_dir = "/var/lib/garage/data"
              db_engine = "sqlite"

              replication_factor = 1
              consistency_mode = "consistent"

              rpc_bind_addr = "[::]:3901"
              rpc_public_addr = "127.0.0.1:3901"

              [s3_api]
              s3_region = "garage"
              api_bind_addr = "[::]:3900"

              [s3_web]
              bind_addr = "[::]:3902"
              root_domain = "localhost"

              [admin]
              api_bind_addr = "[::]:3903"
      persistence:
        garage-meta:
          enabled: true
          type: hostPath
          hostPath: /srv/kurrier/garage/meta
          hostPathType: DirectoryOrCreate
          mountPath: /var/lib/garage/meta
        garage-data:
          enabled: true
          type: hostPath
          hostPath: /srv/kurrier/garage/data
          hostPathType: DirectoryOrCreate
          mountPath: /var/lib/garage/data
