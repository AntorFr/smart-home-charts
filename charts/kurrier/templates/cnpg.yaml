{{- include "common.values.setup" . }}
{{- if .Values.database.cnpg.enabled }}
{{- $clusterName := default "db" .Values.database.cnpg.clusterName -}}
{{- $username := default "kurrier" .Values.database.cnpg.username -}}
{{- $database := default "kurrier" .Values.database.cnpg.database -}}
{{- $superuserSecret := printf "%s-cnpg-superuser" (include "common.names.fullname" .) -}}
{{- $appSecret := printf "%s-cnpg-app" (include "common.names.fullname" .) -}}
{{- $superuserPassword := include "kurrier.envValue" (dict "key" "POSTGRES_PASSWORD" "content" .Values.envFile.content) | trim -}}
{{- $rlsUrl := include "kurrier.envValue" (dict "key" "DATABASE_RLS_URL" "content" .Values.envFile.content) | trim -}}
{{- $appPassword := include "kurrier.urlPassword" $rlsUrl -}}
{{- if eq $superuserPassword "" -}}
{{- fail "database.cnpg requires POSTGRES_PASSWORD in envFile.content" -}}
{{- end -}}
{{- if eq $appPassword "" -}}
{{- fail "database.cnpg requires DATABASE_RLS_URL (postgresql://user:password@host:port/db) in envFile.content" -}}
{{- end }}
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ $superuserSecret }}
  labels:
    {{- include "common.labels" . | nindent 4 }}
type: kubernetes.io/basic-auth
stringData:
  username: postgres
  password: {{ $superuserPassword | quote }}
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ $appSecret }}
  labels:
    {{- include "common.labels" . | nindent 4 }}
type: kubernetes.io/basic-auth
stringData:
  username: {{ $username | quote }}
  password: {{ $appPassword | quote }}
---
apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: {{ $clusterName }}
  labels:
    {{- include "common.labels" . | nindent 4 }}
spec:
  instances: {{ default 1 .Values.database.cnpg.instances }}
  imageName: {{ .Values.database.cnpg.imageName | quote }}
  storage:
    size: {{ default "20Gi" .Values.database.cnpg.storage.size }}
    {{- if .Values.database.cnpg.storage.storageClass }}
    storageClass: {{ .Values.database.cnpg.storage.storageClass | quote }}
    {{- end }}
  enableSuperuserAccess: true
  superuserSecret:
    name: {{ $superuserSecret }}
  bootstrap:
    initdb:
      database: {{ $database | quote }}
      owner: {{ $username | quote }}
      secret:
        name: {{ $appSecret }}
{{- end }}
