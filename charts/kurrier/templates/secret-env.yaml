{{- include "common.values.setup" . }}
{{- if and .Values.envFile.create (not .Values.envFile.existingSecret) }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "kurrier.envSecretName" . }}
  labels:
    {{- include "common.labels" . | nindent 4 }}
type: Opaque
stringData:
{{- $lines := splitList "\n" .Values.envFile.content }}
{{- range $line := $lines }}
{{- $trimmed := trim $line }}
{{- if and $trimmed (not (hasPrefix "#" $trimmed)) }}
{{- $parts := regexSplit "=" $trimmed 2 }}
{{- if eq (len $parts) 2 }}
  {{ index $parts 0 | trim }}: {{ index $parts 1 | trim | quote }}
{{- end }}
{{- end }}
{{- end }}
{{- end }}
