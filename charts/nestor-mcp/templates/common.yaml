{{/* Make sure all variables are set properly */}}
{{- include "common.values.setup" . }}

{{/* Inject the .env file Secret as a read-only volume mount */}}
{{- $_ := set .Values.persistence "env-file" (dict
  "enabled" true
  "type" "secret"
  "name" (printf "%s-env" (include "common.names.fullname" .))
  "subPath" ".env"
  "mountPath" (default "/app/.env" .Values.envFile.mountPath)
  "readOnly" true
  "defaultMode" 0400) -}}

{{/* Render the templates */}}
{{ include "common.all" . }}
