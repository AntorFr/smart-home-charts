#
# IMPORTANT NOTE
#
# This chart inherits from our common library chart. You can check the default values/options here:
# https://github.com/k8s-at-home/library-charts/tree/main/charts/stable/common/values.yaml
#

image:
  # -- image repository
  repository: ghcr.io/antorfr/nestor-mcp
  # -- image tag
  tag: "0.0.9-beta"
  # -- image pull policy
  pullPolicy: IfNotPresent

# -- .env file stored as a Kubernetes Secret and mounted inside the container.
# The entire file content is defined here. Sensitive values (tokens, API keys)
# must be overridden at deploy time via --set or a separate values override file
# that is NOT committed to source control.
# HOST_* variables from docker-compose are omitted: they are host-side bind-mount
# paths with no meaning in Kubernetes (use persistence.data instead).
# @default -- See below
envFile:
  # -- Mount path of the .env file inside the container.
  mountPath: /app/.env
  # -- Content of the .env file.
  content: |
    NESTOR_ENV=local
    NESTOR_LOG_LEVEL=INFO

    MCP_SERVER_NAME=nestor-mcp
    MCP_HOST=0.0.0.0
    MCP_PORT=8000

    HOME_ASSISTANT_URL=http://homeassistant.local:8123
    HOME_ASSISTANT_TOKEN=
    ALLOW_DIRECT_HA_WRITES=false

    GITOPS_REPO_PATH=/data/home-assistant-config
    HOST_GITOPS_REPO_PATH=./data/home-assistant-config
    GITOPS_REPO_URL=https://github.com/AntorFr/Home-AssistantConfig.git
    GITOPS_DEFAULT_BRANCH=master

    GITHUB_TOKEN=
    GITHUB_REPO=AntorFr/Home-AssistantConfig
    GITHUB_API_URL=https://api.github.com
    GIT_AUTHOR_NAME=Nestor MCP
    GIT_AUTHOR_EMAIL=nestor-mcp@users.noreply.github.com

    PROPOSALS_PATH=/data/nestor-mcp/proposals
    WORKFLOW_RUNS_PATH=/data/nestor-mcp/workflow-runs
    HOST_PROPOSALS_PATH=./data/proposals
    HOST_WORKFLOW_RUNS_PATH=./data/workflow-runs

    DEFAULT_LLM_PROVIDER=mock
    DEFAULT_CODE_AGENT_PROVIDER=claude_code
    HA_EXPLAIN_PROVIDER=mock
    HA_EXPLAIN_MODEL=claude-haiku-4-5-20251001
    HA_EXPLAIN_TIMEOUT_SECONDS=20
    HA_GITOPS_PROVIDER=claude_code
    HA_GITOPS_TIMEOUT_SECONDS=180

    ANTHROPIC_API_KEY=
    CLAUDE_CODE_COMMAND=claude
    CLAUDE_CODE_TIMEOUT_SECONDS=120


# -- Standalone CronJobs running alongside the main server.
# @default -- See below
cronjobs:
  # -- Periodically sync the local GitOps repo clone from upstream.
  sync-gitops-repo:
    enabled: true
    schedule: "0 * * * *"
    concurrencyPolicy: Forbid
    restartPolicy: OnFailure
    backoffLimit: 2
    successfulJobsHistoryLimit: 3
    failedJobsHistoryLimit: 3
    image:
      repository: ghcr.io/antorfr/nestor-mcp
      tag: "0.0.9-beta"
      pullPolicy: IfNotPresent
    command:
      - python
      - -m
      - nestor_mcp.devtools.sync_gitops_repo
    securityContext:
      allowPrivilegeEscalation: false
      readOnlyRootFilesystem: true
      capabilities:
        drop:
          - ALL
    podSecurityContext:
      runAsNonRoot: true
      runAsUser: 1000
      runAsGroup: 1000
      fsGroup: 1000
    resources:
      requests:
        cpu: 50m
        memory: 128Mi
      limits:
        cpu: 500m
        memory: 512Mi
    persistence:
      # -- Same PVC as the main container, provides /data/home-assistant-config.
      data:
        enabled: false
        mountPath: /data
        storageClass:
        accessMode: ReadWriteOnce
        size: 5Gi
        retain: true
      # -- Mount the .env Secret file (same Secret created by templates/secret.yaml).
      env-file:
        enabled: true
        type: secret
        name: '{{ include "common.names.fullname" . }}-env'
        subPath: .env
        mountPath: /app/.env
        readOnly: true
        defaultMode: 0400
      tmp:
        enabled: true
        type: emptyDir
        mountPath: /tmp

# -- Configures service settings for the chart.
# @default -- See values.yaml
service:
  main:
    ports:
      http:
        port: 8000

# -- Probe configuration — HTTP on /health.
probes:
  liveness:
    enabled: true
    custom: true
    spec:
      httpGet:
        path: /health
        port: 8000
      initialDelaySeconds: 10
      periodSeconds: 30
      timeoutSeconds: 5
      failureThreshold: 3
  readiness:
    enabled: true
    custom: true
    spec:
      httpGet:
        path: /health
        port: 8000
      initialDelaySeconds: 5
      periodSeconds: 10
      timeoutSeconds: 5
      failureThreshold: 3
  startup:
    enabled: true
    custom: true
    spec:
      httpGet:
        path: /health
        port: 8000
      initialDelaySeconds: 0
      periodSeconds: 5
      timeoutSeconds: 5
      failureThreshold: 30

# -- Configure ingress settings for the chart under this key.
# Access should remain internal to the cluster by default.
# @default -- See values.yaml
ingress:
  main:
    enabled: false

# -- Security context for the main container.
securityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  capabilities:
    drop:
      - ALL

# -- Security context for the pod.
podSecurityContext:
  fsGroup: 1000
  runAsNonRoot: true
  runAsUser: 1000

# -- Resource requests and limits.
# Claude Code can spike CPU during analysis; keep limits configurable.
resources:
  requests:
    cpu: 100m
    memory: 256Mi
  limits:
    cpu: 2000m
    memory: 2Gi

# -- Configure persistence settings for the chart under this key.
# @default -- See values.yaml
persistence:
  # -- Single PVC mounted on /data covering repo clone, proposals and workflow-runs.
  data:
    enabled: false
    mountPath: /data
    storageClass:  # "-" to disable dynamic provisioning
    accessMode: ReadWriteOnce
    size: 5Gi
    retain: true

  # -- Writable /tmp for Python and Claude Code scratch space (readOnlyRootFilesystem).
  tmp:
    enabled: true
    type: emptyDir
    mountPath: /tmp


