annotations:
  artifacthub.io/changes: |-
    - kind: added
      description: Support `controller.type: cronjob` — renders a CronJob reusing the common pod spec (initContainers, additionalContainers, volumes, persistence). New `cronjob.*` values block (schedule, concurrencyPolicy, history limits, restartPolicy, backoffLimit, ttlSecondsAfterFinished, timeZone, suspend...).
    - kind: changed
      description: Bumped minimum kubeVersion to 1.21 (required for `batch/v1` CronJob GA).
