annotations:
  artifacthub.io/changes: |-
    - kind: fixed
      description: "externalSecrets: multi-document rendering glued the `---` separator to the previous line (chomped newline), YAML-merging the documents so only the last ExternalSecret survived — and Helm pruned the missing one. Separators are now emitted explicitly."
    - kind: added
      description: "`externalSecrets.groups:` — split secrets into one ExternalSecret per consumer (`<fullname>-<group>-secrets`), auto-wired into the matching `additionalContainers` entry. Confines ESO's atomic-sync blast radius: a missing key only fails its own group, not the whole pod's Secret."
