{{/* Make sure all variables are set properly */}}
{{- include "common.values.setup" . }}

{{/*
Override the common controller.ports template to inject hostPort for TFTP.
common only renders name/containerPort/protocol — we need hostPort for UDP 69
so the kubelet binds it directly on the node interface.
*/}}
{{- define "common.controller.ports" -}}
  {{- $ports := list -}}
  {{- range .Values.service -}}
    {{- if .enabled -}}
      {{- range $name, $port := .ports -}}
        {{- $_ := set $port "name" $name -}}
        {{- $ports = mustAppend $ports $port -}}
      {{- end }}
    {{- end }}
  {{- end }}

  {{/* Append TFTP hostPort (not managed by service) */}}
  {{- if and .Values.hostPort .Values.hostPort.tftp .Values.hostPort.tftp.enabled }}
  {{- $tftp := dict "name" "tftp" "containerPort" (.Values.hostPort.tftp.containerPort | int) "hostPort" (.Values.hostPort.tftp.hostPort | int) "protocol" (default "UDP" .Values.hostPort.tftp.protocol) "enabled" true -}}
  {{- $ports = mustAppend $ports $tftp -}}
  {{- end }}

{{/* export/render the list of ports */}}
{{- if $ports -}}
{{- range $_ := $ports }}
{{- if .enabled }}
- name: {{ .name }}
  {{- if and .targetPort (kindIs "string" .targetPort) }}
  {{- fail (printf "Our charts do not support named ports for targetPort. (port name %s, targetPort %s)" .name .targetPort) }}
  {{- end }}
  containerPort: {{ .containerPort | default (.targetPort | default .port) }}
  {{- if .hostPort }}
  hostPort: {{ .hostPort }}
  {{- end }}
  {{- if .protocol }}
  {{- if or ( eq .protocol "HTTP" ) ( eq .protocol "HTTPS" ) ( eq .protocol "TCP" ) }}
  protocol: TCP
  {{- else }}
  protocol: {{ .protocol }}
  {{- end }}
  {{- else }}
  protocol: TCP
  {{- end }}
{{- end }}
{{- end -}}
{{- end -}}
{{- end -}}

{{/* Render the templates */}}
{{ include "common.all" . }}
