{{/*
Renderer script: unmined-cli for each world
*/}}
{{- define "unmined.rendererScript" }}
set -e
{{- range $world := .Values.worlds }}
echo "Rendering world: {{ $world.name }}"
unmined-cli web render \
  --world="{{ $world.worldPath }}" \
  --output="/output/{{ $world.name }}" \
  {{- if $.Values.resourcePack.enabled }}
  --bedrock-vanilla-pack="{{ $.Values.resourcePack.mountPath }}/bedrock-samples.zip" \
  {{- end }}
  {{- range $world.extraArgs }}
  "{{ . }}" \
  {{- end }}
{{- end }}
echo "Done"
{{- end }}

{{/*
Resource pack download script
*/}}
{{- define "unmined.resourcePackDownload" }}
set -e
ZIP="{{ .Values.resourcePack.mountPath }}/bedrock-samples.zip"
if [ ! -f "$ZIP" ]; then
  echo "Downloading Bedrock resource pack..."
  mkdir -p "{{ .Values.resourcePack.mountPath }}"
  curl -fL "{{ .Values.resourcePack.url }}" -o "$ZIP"
  echo "Downloaded to $ZIP"
else
  echo "Resource pack already cached at $ZIP"
fi
{{- end }}

{{/*
Nginx config helper
*/}}
{{- define "unmined.nginxConfig" }}
server {
  listen 80;
  server_name _;

  # Serve /output contents at root
  root /usr/share/nginx/html;
  index index.html index.htm;

  # Auto-index for map listing
  autoindex on;
  autoindex_exact_size off;
  autoindex_localtime on;

  # Gzip compression
  gzip on;
  gzip_types text/plain text/css application/json image/svg+xml;
  gzip_vary on;

  # Cache tiles (immutable, content-addressed)
  location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg)$ {
    expires 30d;
    add_header Cache-Control "public, immutable";
  }

  location / {
    try_files $uri $uri/ =404;
  }
}
{{- end }}

---
{{- include "common.values.setup" . }}

{{- if .Values.worlds }}

{{- /* Build renderer CronJob persistence */ -}}
{{- $cronjobPersistence := dict -}}
{{- $_ := set $cronjobPersistence "worlds" (dict
  "enabled" true
  "type" .Values.persistence.worlds.type
  "mountPath" .Values.persistence.worlds.mountPath
  "hostPath" .Values.persistence.worlds.hostPath
  "readOnly" (default false .Values.persistence.worlds.readOnly)
) -}}
{{- $_ := set $cronjobPersistence "output" (dict
  "enabled" true
  "type" .Values.persistence.output.type
  "mountPath" .Values.persistence.output.mountPath
  "hostPath" .Values.persistence.output.hostPath
) -}}
{{- if .Values.resourcePack.enabled -}}
  {{- $_ := set $cronjobPersistence "resourcepack" (dict
    "enabled" true
    "type" .Values.persistence.resourcepack.type
    "mountPath" .Values.persistence.resourcepack.mountPath
    "hostPath" .Values.persistence.resourcepack.hostPath
  ) -}}
{{- end -}}

{{- /* Build init containers for resource pack download */ -}}
{{- $initContainers := dict -}}
{{- if .Values.resourcePack.enabled -}}
  {{- $_ := set $initContainers "resourcepack-download" (dict
    "image" "curlimages/curl:8.9.1"
    "command" (list "sh" "-c")
    "args" (list (include "unmined.resourcePackDownload" .))
    "volumeMounts" (list
      (dict "name" "resourcepack" "mountPath" .Values.resourcePack.mountPath)
    )
  ) -}}
{{- end -}}

{{- /* Inject renderer cronjob into .Values.cronjobs */ -}}
{{- $rendererScript := include "unmined.rendererScript" . -}}
{{- $_ := set .Values "cronjobs" (dict "renderer" (dict
  "enabled" true
  "image" .Values.renderer.image
  "command" (list "sh" "-c")
  "args" (list $rendererScript)
  "schedule" .Values.renderer.schedule
  "concurrencyPolicy" (default "Forbid" .Values.renderer.concurrencyPolicy)
  "successfulJobsHistoryLimit" (default 1 .Values.renderer.successfulJobsHistoryLimit)
  "failedJobsHistoryLimit" (default 3 .Values.renderer.failedJobsHistoryLimit)
  "restartPolicy" "OnFailure"
  "backoffLimit" 2
  "resources" .Values.renderer.resources
  "persistence" $cronjobPersistence
  "initContainers" $initContainers
)) -}}

{{- /* Enable output persistence for the main Deployment (nginx) */ -}}
{{- $_ := set .Values.persistence.output "enabled" true -}}

{{- /* Configure nginx config as a configMap volume */ -}}
{{- $_ := set .Values.persistence "nginx-config" (dict
  "enabled" true
  "type" "configMap"
  "name" (printf "%s-nginx" (include "common.names.fullname" .))
  "mountPath" "/etc/nginx/conf.d"
  "readOnly" true
) -}}

{{- /* Map output to nginx html dir for the Deployment */ -}}
{{- $_ := set .Values.persistence.output "mountPath" "/usr/share/nginx/html" -}}
{{- $_ := set .Values.persistence.output "readOnly" true -}}

{{- /* Render everything via common */ -}}
{{ include "common.all" . }}

{{/* Render nginx ConfigMap */}}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "common.names.fullname" . }}-nginx
  labels:
    {{- include "common.labels" . | nindent 4 }}
data:
  default.conf: {{ include "unmined.nginxConfig" . | quote }}

{{- end }}
