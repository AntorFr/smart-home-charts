# Web server (Deployment nginx) configuration
image:
  repository: nginx
  tag: 1.27-alpine
  pullPolicy: IfNotPresent

env:
  TZ: UTC

# List of Minecraft worlds to render
# Each world produces tiles in output/<name>/
worlds:
  - name: example
    worldPath: /worlds/<uuid>/worlds/Bedrock level
    extraArgs: []
  # - name: survival
  #   worldPath: /worlds/<uuid>/worlds/Survival

# Bedrock resource pack (optional but recommended for Bedrock textures)
resourcePack:
  enabled: true
  # URL of bedrock-samples release to download
  url: https://github.com/Mojang/bedrock-samples/archive/refs/tags/v1.26.0.2.zip
  mountPath: /resourcepack

# CronJob for map rendering (managed by common's cronjobs: section)
cronjobs:
  renderer:
    enabled: true
    image:
      repository: ghcr.io/antorfr/smart-home-charts/unmined-cli
      tag: "dev"
      pullPolicy: IfNotPresent
    command:
      - sh
      - -c
    # args is dynamically set from worlds config in templates/common.yaml
    args: []
    schedule: "*/30 * * * *"
    concurrencyPolicy: Forbid
    restartPolicy: OnFailure
    backoffLimit: 2
    successfulJobsHistoryLimit: 1
    failedJobsHistoryLimit: 3
    resources:
      requests:
        cpu: 200m
        memory: 512Mi
      limits:
        cpu: 2000m
        memory: 2Gi
    persistence:
      worlds:
        enabled: true
        type: hostPath
        mountPath: /worlds
        hostPath: /mnt/data/crafty/servers
        readOnly: true
      output:
        enabled: true
        type: hostPath
        mountPath: /output
        hostPath: /mnt/data/unmined
      resourcepack:
        enabled: true
        type: hostPath
        mountPath: /resourcepack
        hostPath: /mnt/data/unmined-resourcepack
    initContainers: {}
    # initContainers is dynamically set for resourcepack download in templates/common.yaml

# Pod security context
podSecurityContext:
  fsGroup: 1000

# Persistence for the main Deployment (nginx web server)
persistence:
  # Renderer output (mounted read-only in nginx)
  output:
    enabled: true
    type: hostPath
    mountPath: /usr/share/nginx/html
    hostPath: /mnt/data/unmined
    readOnly: true

  # Minecraft worlds (not mounted in nginx, only used by cronjob)
  worlds:
    enabled: false
    type: hostPath
    mountPath: /worlds
    hostPath: /mnt/data/crafty/servers
    readOnly: true

  # Bedrock resource pack cache (not mounted in nginx, only used by cronjob)
  resourcepack:
    enabled: false
    type: hostPath
    mountPath: /resourcepack
    hostPath: /mnt/data/unmined-resourcepack

# Service configuration
service:
  main:
    enabled: true
    primary: true
    type: ClusterIP
    ports:
      http:
        enabled: true
        primary: true
        port: 80
        protocol: HTTP

# Ingress configuration
ingress:
  main:
    enabled: false
    ingressClassName: traefik
    annotations:
      cert-manager.io/cluster-issuer: letsencrypt-prod
    hosts:
      - host: maps.example.com
        paths:
          - path: /
            pathType: Prefix
    tls:
      - secretName: unmined-tls
        hosts:
          - maps.example.com
