#
# IMPORTANT NOTE
#
# This chart inherits from our common library chart. You can check the default values/options here:
# https://github.com/k8s-at-home/library-charts/tree/main/charts/stable/common/values.yaml
#

controller:
  replicas: 1

image:
  # -- image repository
  repository: ghcr.io/squidfunk/mkdocs-material
  # -- image tag
  tag: latest
  # -- image pull policy
  pullPolicy: IfNotPresent

# -- Serve docs from /docs on port 8000.
command:
  - mkdocs
args:
  - serve
  - --dev-addr=0.0.0.0:8000
  - --config-file=/docs/mkdocs.yml

# -- Optional environment variables for mkdocs runtime.
# @default -- See below
env:
  TZ: UTC

# -- Configures service settings for the chart.
# @default -- See values.yaml
service:
  main:
    type: ClusterIP
    ports:
      http:
        port: 8000
        targetPort: 8000

# -- Configure ingress settings for the chart under this key.
# @default -- See values.yaml
ingress:
  main:
    enabled: false

# -- Probe configuration.
probes:
  liveness:
    enabled: true
    custom: true
    spec:
      httpGet:
        path: /
        port: 8000
      initialDelaySeconds: 15
      periodSeconds: 30
      timeoutSeconds: 5
      failureThreshold: 3
  readiness:
    enabled: true
    custom: true
    spec:
      httpGet:
        path: /
        port: 8000
      initialDelaySeconds: 5
      periodSeconds: 10
      timeoutSeconds: 5
      failureThreshold: 3
  startup:
    enabled: true
    custom: true
    spec:
      httpGet:
        path: /
        port: 8000
      initialDelaySeconds: 0
      periodSeconds: 5
      timeoutSeconds: 5
      failureThreshold: 30

# -- Security context for the main container.
securityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  capabilities:
    drop:
      - ALL

# -- Security context for the pod.
podSecurityContext:
  fsGroup: 1000
  runAsNonRoot: true
  runAsUser: 1000

# -- Resource requests and limits.
resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 512Mi

# -- Configure persistence settings for the chart under this key.
# @default -- See values.yaml
persistence:
  # -- Single PVC for mkdocs source content (mkdocs.yml + docs/).
  data:
    enabled: false
    mountPath: /docs
    storageClass:  # "-"
    accessMode: ReadWriteOnce
    size: 2Gi
    retain: true

  # -- Writable temporary directory required with readOnlyRootFilesystem.
  tmp:
    enabled: true
    type: emptyDir
    mountPath: /tmp
